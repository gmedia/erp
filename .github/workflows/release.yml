name: Release Application

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      image_tag:
        description: Container image tag to publish
        required: false
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_REPOSITORY: ${{ github.repository }}
  BASE_IMAGE_TAG: 8.4

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    outputs:
      image_tag: ${{ steps.prepare.outputs.image_tag }}
      app_image: ${{ steps.prepare.outputs.app_image }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Determine image metadata
        id: prepare
        shell: bash
        env:
          IMAGE_TAG_INPUT: ${{ inputs.image_tag }}
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            image_tag="${GITHUB_REF_NAME}"
          elif [[ -n "${IMAGE_TAG_INPUT}" ]]; then
            if [[ ! "${IMAGE_TAG_INPUT}" =~ ^[A-Za-z0-9_][A-Za-z0-9_.-]{0,127}$ ]]; then
              echo "Invalid image_tag input." >&2
              exit 1
            fi

            image_tag="${IMAGE_TAG_INPUT}"
          else
            image_tag="sha-${GITHUB_SHA::12}"
          fi

          echo "image_tag=${image_tag}" >> "$GITHUB_OUTPUT"
          echo "base_image=${REGISTRY}/${IMAGE_REPOSITORY}/base:${BASE_IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "app_image=${REGISTRY}/${IMAGE_REPOSITORY}/app:${image_tag}" >> "$GITHUB_OUTPUT"

      - name: Log in to the Container registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for app image
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_REPOSITORY }}/app
          tags: |
            type=raw,value=${{ steps.prepare.outputs.image_tag }}
            type=sha,format=short,prefix=sha-
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Build and push base image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: docker/dist/base/Dockerfile
          push: true
          tags: ${{ steps.prepare.outputs.base_image }}
          cache-from: type=gha,scope=base-image
          cache-to: type=gha,mode=max,scope=base-image

      - name: Build and push app image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: docker/dist/http/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BASE_IMAGE=${{ steps.prepare.outputs.base_image }}
          cache-from: |
            type=gha,scope=base-image
            type=gha,scope=app-image
          cache-to: type=gha,mode=max,scope=app-image

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2
        with:
          tag_name: ${{ steps.prepare.outputs.image_tag }}
          generate_release_notes: true
          body: |
            Container image published:
            - `${{ steps.prepare.outputs.app_image }}`
