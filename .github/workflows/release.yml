name: Release Application

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      image_tag:
        description: Container image tag to publish
        required: false
        type: string

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_REPOSITORY: ${{ github.repository }}
  BASE_IMAGE_TAG: 8.4

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    outputs:
      image_tag: ${{ steps.prepare.outputs.image_tag }}
      app_image: ${{ steps.prepare.outputs.app_image }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Determine image metadata
        id: prepare
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            image_tag="${GITHUB_REF_NAME}"
          elif [[ -n "${{ inputs.image_tag }}" ]]; then
            image_tag="${{ inputs.image_tag }}"
          else
            image_tag="sha-${GITHUB_SHA::12}"
          fi

          echo "image_tag=${image_tag}" >> "$GITHUB_OUTPUT"
          echo "base_image=${REGISTRY}/${IMAGE_REPOSITORY}/base:${BASE_IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "app_image=${REGISTRY}/${IMAGE_REPOSITORY}/app:${image_tag}" >> "$GITHUB_OUTPUT"

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for app image
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_REPOSITORY }}/app
          tags: |
            type=raw,value=${{ steps.prepare.outputs.image_tag }}
            type=sha,format=short,prefix=sha-
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push base image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/dist/base/Dockerfile
          push: true
          tags: ${{ steps.prepare.outputs.base_image }}
          cache-from: type=gha,scope=base-image
          cache-to: type=gha,mode=max,scope=base-image

      - name: Build and push app image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/dist/http/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BASE_IMAGE=${{ steps.prepare.outputs.base_image }}
          cache-from: |
            type=gha,scope=base-image
            type=gha,scope=app-image
          cache-to: type=gha,mode=max,scope=app-image

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.prepare.outputs.image_tag }}
          generate_release_notes: true
          body: |
            Container image published:
            - `${{ steps.prepare.outputs.app_image }}`
