name: Lint

on:
  push:
    branches:
      - develop
      - main
  pull_request:
    branches:
      - develop
      - main

concurrency:
  group: lint-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Quality checks via Sail
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none
          tools: composer:v2

      - name: Prepare environment
        run: cp .env.example .env

      - name: Bootstrap Sail dependencies
        run: composer install -q --no-ansi --no-interaction --no-progress --prefer-dist

      - name: Start Sail
        run: ./vendor/bin/sail up -d --wait

      - name: Validate Composer configuration
        run: ./vendor/bin/sail composer validate --strict

      - name: Run Pint in test mode
        run: ./vendor/bin/sail pint --test

      - name: Install Node dependencies
        run: ./vendor/bin/sail npm ci

      - name: Check Prettier formatting
        run: ./vendor/bin/sail npm run format:check

      - name: Lint frontend
        run: ./vendor/bin/sail npm run lint:check

      - name: Check TypeScript
        run: ./vendor/bin/sail npm run types

      - name: Stop Sail
        if: always()
        run: |
          if [ -x ./vendor/bin/sail ]; then
            ./vendor/bin/sail down -v
          fi
