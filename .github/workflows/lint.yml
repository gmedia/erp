name: Lint

on:
  push:
    branches:
      - develop
      - main
  pull_request:
    branches:
      - develop
      - main

concurrency:
  group: lint-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: read

env:
  CI_SAIL_IMAGE: ghcr.io/${{ github.repository }}/ci-sail:8.4

jobs:
  quality:
    name: Quality checks via Sail
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.4
          tools: composer:v2
          coverage: none

      - name: Prepare environment
        run: |
          cp .env.example .env
          sed -i "s/^WWWUSER=.*/WWWUSER=$(id -u)/" .env
          sed -i "s/^WWWGROUP=.*/WWWGROUP=$(id -g)/" .env
          mkdir -p storage/tmp
          chmod 777 storage/tmp

      - name: Bootstrap Sail dependencies
        run: composer install -q --no-ansi --no-interaction --no-progress --prefer-dist

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull CI Sail image
        shell: bash
        run: |
          branch_tag="${GITHUB_BASE_REF:-${GITHUB_REF_NAME}}"
          candidates=(
            "$CI_SAIL_IMAGE"
            "ghcr.io/${GITHUB_REPOSITORY}/ci-sail:${branch_tag}"
            "ghcr.io/${GITHUB_REPOSITORY}/ci-sail:latest"
          )

          for image in "${candidates[@]}"; do
            for attempt in 1 2 3 4 5; do
              if docker pull "$image"; then
                docker tag "$image" sail-8.4/app
                exit 0
              fi

              echo "CI Sail image $image not available yet. Retry ${attempt}/5 in 15s..."
              sleep 15
            done
          done

          echo "Unable to pull any CI Sail image candidate." >&2
          exit 1

      - name: Start Sail
        run: ./vendor/bin/sail up -d --wait

      - name: Validate Composer configuration
        run: ./vendor/bin/sail composer validate --strict

      - name: Run Pint
        run: ./vendor/bin/sail run php -d sys_temp_dir=/var/www/html/storage/tmp ./vendor/bin/pint

      - name: Install Node dependencies
        run: ./vendor/bin/sail npm ci

      - name: Format frontend
        run: ./vendor/bin/sail npm run format

      - name: Lint frontend
        run: ./vendor/bin/sail npm run lint

      - name: Check TypeScript
        run: ./vendor/bin/sail npm run types

      - name: Stop Sail
        if: always()
        run: |
          if [ -x ./vendor/bin/sail ]; then
            ./vendor/bin/sail down -v
          fi
