name: Tests

on:
  push:
    branches:
      - develop
      - main
  pull_request:
    branches:
      - develop
      - main

concurrency:
  group: tests-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: read

env:
  CI_SAIL_IMAGE: ghcr.io/${{ github.repository }}/ci-sail:8.4

jobs:
  ci:
    name: Test suite via Sail
    runs-on: ubuntu-latest
    timeout-minutes: 50

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.4
          tools: composer:v2
          coverage: none

      - name: Prepare environment
        run: |
          cp .env.example .env
          sed -i "s/^WWWUSER=.*/WWWUSER=$(id -u)/" .env
          sed -i "s/^WWWGROUP=.*/WWWGROUP=$(id -g)/" .env
          mkdir -p storage/tmp
          chmod 777 storage/tmp

      - name: Bootstrap Sail dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull CI Sail image
        shell: bash
        run: |
          branch_tag="${GITHUB_BASE_REF:-${GITHUB_REF_NAME}}"
          candidates=(
            "$CI_SAIL_IMAGE"
            "ghcr.io/${GITHUB_REPOSITORY}/ci-sail:${branch_tag}"
            "ghcr.io/${GITHUB_REPOSITORY}/ci-sail:latest"
          )

          for image in "${candidates[@]}"; do
            for attempt in 1 2 3 4 5; do
              if docker pull "$image"; then
                docker tag "$image" sail-8.4/app
                exit 0
              fi

              echo "CI Sail image $image not available yet. Retry ${attempt}/5 in 15s..."
              sleep 15
            done
          done

          echo "Unable to pull any CI Sail image candidate." >&2
          exit 1

      - name: Start Sail
        run: ./vendor/bin/sail up -d --wait

      - name: Configure MinIO bucket
        run: |
          ./vendor/bin/sail exec -T minio mc alias set myminio http://localhost:9000 sail password
          ./vendor/bin/sail exec -T minio mc mb myminio/local || true
          ./vendor/bin/sail exec -T minio mc anonymous set download myminio/local || true

      - name: Install Node dependencies
        run: ./vendor/bin/sail npm ci

      - name: Generate Application Key
        run: ./vendor/bin/sail artisan key:generate

      - name: Clear configuration cache
        run: ./vendor/bin/sail artisan config:clear

      - name: Build assets
        run: ./vendor/bin/sail npm run build

      - name: Run tests
        run: ./vendor/bin/sail test --colors=always

      - name: Upload failure logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: laravel-logs
          path: storage/logs
          if-no-files-found: ignore

      - name: Stop Sail
        if: always()
        run: |
          if [ -x ./vendor/bin/sail ]; then
            ./vendor/bin/sail down -v
          fi
