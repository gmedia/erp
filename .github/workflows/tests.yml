name: Tests

on:
  push:
    branches:
      - develop
      - main
  pull_request:
    branches:
      - develop
      - main

concurrency:
  group: tests-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    name: Test suite via Sail
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.4
          tools: composer:v2
          coverage: none

      - name: Prepare environment
        run: |
          cp .env.example .env
          cat <<'EOF' >> .env
          CACHE_STORE=array
          QUEUE_CONNECTION=sync
          SESSION_DRIVER=array
          FILESYSTEM_DISK=local
          MAIL_MAILER=array
          EOF

      - name: Bootstrap Sail dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Start Sail
        run: ./vendor/bin/sail up -d --wait

      - name: Install Node dependencies
        run: ./vendor/bin/sail npm ci

      - name: Generate Application Key
        run: ./vendor/bin/sail artisan key:generate

      - name: Clear configuration cache
        run: ./vendor/bin/sail artisan config:clear

      - name: Build assets
        run: ./vendor/bin/sail npm run build

      - name: Run tests
        run: ./vendor/bin/sail test --colors=always

      - name: Upload failure logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: laravel-logs
          path: storage/logs
          if-no-files-found: ignore

      - name: Stop Sail
        if: always()
        run: |
          if [ -x ./vendor/bin/sail ]; then
            ./vendor/bin/sail down -v
          fi
