name: Deploy Application

on:
  workflow_run:
    workflows: ["Release Application"]
    types:
      - completed
  workflow_dispatch:
    inputs:
      image_tag:
        description: Container image tag to deploy
        required: true
        type: string

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_REPOSITORY: ${{ github.repository }}

jobs:
  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push') }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: production
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Resolve image tag
        id: image
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            image_tag="${{ inputs.image_tag }}"
          else
            git fetch --force --tags
            image_tag="$(git tag --points-at "${{ github.event.workflow_run.head_sha }}" | grep '^v' | head -n 1)"
          fi

          if [[ -z "${image_tag}" ]]; then
            echo "Unable to resolve a release tag to deploy." >&2
            exit 1
          fi

          echo "image_tag=${image_tag}" >> "$GITHUB_OUTPUT"
          echo "app_image=${REGISTRY}/${IMAGE_REPOSITORY}/app:${image_tag}" >> "$GITHUB_OUTPUT"

      - name: Validate deployment secrets
        shell: bash
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        run: |
          missing=()
          for name in DEPLOY_HOST DEPLOY_USER DEPLOY_SSH_KEY DEPLOY_KNOWN_HOSTS DEPLOY_PATH GHCR_USERNAME GHCR_TOKEN; do
            if [[ -z "${!name}" ]]; then
              missing+=("${name}")
            fi
          done

          if (( ${#missing[@]} > 0 )); then
            printf 'Missing required deployment secrets: %s\n' "${missing[*]}" >&2
            exit 1
          fi

      - name: Configure SSH
        shell: bash
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "$DEPLOY_KNOWN_HOSTS" > ~/.ssh/known_hosts

      - name: Upload deployment assets
        shell: bash
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          remote_port="${DEPLOY_PORT:-22}"
          ssh -p "$remote_port" "$DEPLOY_USER@$DEPLOY_HOST" "mkdir -p '$DEPLOY_PATH/docker/dist/scripts'"
          scp -P "$remote_port" docker-compose.dist.yml "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/docker-compose.dist.yml"
          scp -P "$remote_port" docker/dist/scripts/deploy.sh "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/docker/dist/scripts/deploy.sh"

      - name: Deploy release
        shell: bash
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          DOCKER_STACK_NAME: ${{ secrets.DOCKER_STACK_NAME }}
          DEPLOY_ENV_FILE: ${{ secrets.DEPLOY_ENV_FILE }}
          DEPLOY_NETWORK_NAME: ${{ secrets.DEPLOY_NETWORK_NAME }}
        run: |
          remote_port="${DEPLOY_PORT:-22}"
          ssh -p "$remote_port" "$DEPLOY_USER@$DEPLOY_HOST" "cd '$DEPLOY_PATH' && chmod +x docker/dist/scripts/deploy.sh && APP_IMAGE='${{ steps.image.outputs.app_image }}' GHCR_USERNAME='${GHCR_USERNAME}' GHCR_TOKEN='${GHCR_TOKEN}' STACK_NAME='${DOCKER_STACK_NAME:-erp}' ENV_FILE='${DEPLOY_ENV_FILE:-.env.production}' NETWORK_NAME='${DEPLOY_NETWORK_NAME:-erp-network}' ./docker/dist/scripts/deploy.sh"
