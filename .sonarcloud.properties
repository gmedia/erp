# Shared configuration for SonarQube Cloud analysis.
sonar.sources=app,resources/js
sonar.php.coverage.reportPaths=coverage.xml

# Exclude generated/vendor-like frontend wrappers from rule analysis noise.
sonar.exclusions=

# Exclude files that are not covered by PHPUnit-based coverage collection.
sonar.coverage.exclusions=\
    app/Domain/**, \
    app/Exports/**, \
    app/Http/Resources/**, \
    app/Models/**, \
    resources/js/**

# Exclude model PHPDoc blocks from copy-paste detection (auto-generated by ide-helper).
sonar.cpd.exclusions=app/Models/**

# Silence php:S103 (line length) on models. PHPDoc method/property lines are
# auto-generated by `sail artisan ide-helper:models -RW` and frequently exceed
# 120 chars (e.g. fully-qualified Eloquent\Builder generics combined with long
# whereXxx scope names). Manual line-breaks would be reverted on next regen.
sonar.issue.ignore.multicriteria=ide_helper_long_lines
sonar.issue.ignore.multicriteria.ide_helper_long_lines.ruleKey=php:S103
sonar.issue.ignore.multicriteria.ide_helper_long_lines.resourceKey=app/Models/**
