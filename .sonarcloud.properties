# Shared configuration for SonarQube Cloud analysis.
sonar.sources=app,resources/js
sonar.php.coverage.reportPaths=coverage.xml

# Exclude generated/vendor-like frontend wrappers from rule analysis noise.
sonar.exclusions=\
    resources/js/components/ui/calendar.tsx, \
    resources/js/components/ui/checkbox.tsx, \
    resources/js/components/ui/collapsible.tsx, \
    resources/js/components/ui/form.tsx, \
    resources/js/components/ui/icon.tsx, \
    resources/js/components/ui/input-otp.tsx, \
    resources/js/components/ui/input.tsx, \
    resources/js/components/ui/label.tsx, \
    resources/js/components/ui/pagination.tsx, \
    resources/js/components/ui/placeholder-pattern.tsx, \
    resources/js/components/ui/scroll-area.tsx, \
    resources/js/components/ui/sidebar.tsx, \
    resources/js/components/ui/skeleton.tsx, \
    resources/js/components/ui/table.tsx

# Exclude files that are not covered by PHPUnit-based coverage collection.
sonar.coverage.exclusions=\
    app/Domain/**, \
    app/Exports/**, \
    app/Http/Resources/**, \
    app/Imports/**, \
    app/Models/**, \
    app/Providers/**, \
    resources/js/**

# Keep rule/bug analysis on these files, but ignore copy-paste detection
# for highly repetitive table/report presentation definitions.
sonar.cpd.exclusions=\
    app/Actions/**, \
    app/Exports/**, \
    app/Domain/**/**FilterService.php, \
    app/Http/Requests/**, \
    app/Imports/**, \
    app/Models/**, \
    app/Http/Resources/**, \
    app/Providers/AppServiceProvider.php, \
    resources/js/**
