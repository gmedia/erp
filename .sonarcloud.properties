# Shared configuration for SonarQube Cloud analysis.
sonar.sources=.
sonar.php.coverage.reportPaths=coverage.xml
sonar.exclusions=\
    .agent, \
    .claude, \
    .gitlab, \
    bootstrap/cache, \
    coverage-html, \
    coverage.xml, \
    database/migrations, \
    database/seeders, \
    docs, \
    lang, \
    nativephp, \
    public/build, \
    public/storage, \
    storage, \
    tests, \
    vendor
sonar.cpd.exclusions=\
    app/Domain/Assets, \
    app/Domain/AssetMaintenances, \
    app/Domain/AssetMovements, \
    app/Domain/AssetStocktakes, \
    app/Domain/InventoryStocktakes, \
    app/Domain/StockMonitor, \
    app/Domain/StockTransfers, \
    app/Domain/Suppliers, \
    app/Exports, \
    app/Imports, \
    resources/js/components/assets, \
    resources/js/components/asset-maintenances, \
    resources/js/components/reports, \
    resources/js/components/stock-monitor, \
    resources/js/components/stock-movements
