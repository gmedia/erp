# Shared configuration for SonarQube Cloud analysis.
sonar.sources=app,resources/js
sonar.php.coverage.reportPaths=coverage.xml

# Exclude generated/vendor-like frontend wrappers from rule analysis noise.
sonar.exclusions=

# Exclude files that are not covered by PHPUnit-based coverage collection.
sonar.coverage.exclusions=\
    app/Domain/**, \
    app/Exports/**, \
    app/Http/Resources/**, \
    app/Models/**, \
    resources/js/**

# Keep rule/bug analysis on these files, but ignore copy-paste detection
# for highly repetitive table/report presentation definitions.
sonar.cpd.exclusions=\
    app/Actions/**, \
    app/Exports/**, \
    app/Domain/Customers/CustomerFilterService.php, \
    app/Domain/Departments/DepartmentFilterService.php, \
    app/Domain/Employees/EmployeeFilterService.php, \
    app/Domain/FiscalYears/FiscalYearFilterService.php, \
    app/Domain/GoodsReceipts/GoodsReceiptFilterService.php, \
    app/Domain/InventoryStocktakes/InventoryStocktakeFilterService.php, \
    app/Domain/JournalEntries/JournalEntryFilterService.php, \
    app/Domain/Pipelines/PipelineFilterService.php, \
    app/Domain/Positions/PositionFilterService.php, \
    app/Domain/ProductCategories/ProductCategoryFilterService.php, \
    app/Domain/Products/ProductFilterService.php, \
    app/Domain/PurchaseOrders/PurchaseOrderFilterService.php, \
    app/Domain/PurchaseRequests/PurchaseRequestFilterService.php, \
    app/Domain/StockAdjustments/StockAdjustmentFilterService.php, \
    app/Domain/StockTransfers/StockTransferFilterService.php, \
    app/Domain/SupplierCategories/SupplierCategoryFilterService.php, \
    app/Domain/SupplierReturns/SupplierReturnFilterService.php, \
    app/Domain/Suppliers/SupplierFilterService.php, \
    app/Domain/Units/UnitFilterService.php, \
    app/Domain/Warehouses/WarehouseFilterService.php, \
    app/Http/Requests/**, \
    app/Models/**, \
    app/Http/Resources/**, \
    resources/js/**
