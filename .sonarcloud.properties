# Shared configuration for SonarQube Cloud analysis.
sonar.sources=app,resources/js
sonar.php.coverage.reportPaths=coverage.xml

# Exclude generated/vendor-like frontend wrappers from rule analysis noise.
sonar.exclusions=

# Exclude files that are not covered by PHPUnit-based coverage collection.
sonar.coverage.exclusions=\
    app/Domain/**, \
    app/Exports/**, \
    app/Http/Resources/**, \
    app/Models/**, \
    resources/js/**

# Keep rule/bug analysis on these files, but ignore copy-paste detection
# for highly repetitive table/report presentation definitions and thin
# report page wrappers.
sonar.cpd.exclusions=\
    app/Exports/*ReportExport.php, \
    app/Exports/InventoryStocktakeVarianceExport.php, \
    app/Exports/InventoryValuationReportExport.php, \
    app/Http/Resources/Reports/**, \
    resources/js/components/reports/**/Columns.tsx, \
    resources/js/components/reports/**/Filters.tsx, \
    resources/js/pages/reports/**/index.tsx
