# Shared configuration for SonarQube Cloud analysis.
sonar.sources=.
sonar.php.coverage.reportPaths=coverage.xml
sonar.exclusions=\
    .agent/**, \
    .claude/**, \
    .gitlab/**, \
    .github/**, \
    bootstrap/cache/**, \
    coverage-html/**, \
    coverage.xml, \
    database/**, \
    docker/**, \
    docs/**, \
    lang/**, \
    nativephp/**, \
    public/**, \
    resources/**, \
    routes/**, \
    storage/**, \
    tests/**, \
    vendor/**

# Exclude files that are not covered by PHPUnit-based coverage collection.
sonar.coverage.exclusions=\
    .github/**, \
    docker/**, \
    app/Domain/**, \
    app/Exports/**, \
    app/Http/Resources/**, \
    app/Imports/**, \
    app/Models/**, \
    app/Providers/**, \
    resources/js/**, \
    resources/css/**, \
    routes/**, \
    public/**, \
    bootstrap/**, \
    database/**

# Keep rule/bug analysis on these files, but ignore copy-paste detection
# for highly repetitive table/report presentation definitions.
sonar.cpd.exclusions=\
    tests/e2e/**, \
    database/**, \
    app/**, \
    app/Exports/**, \
    app/Domain/**/**FilterService.php, \
    app/Imports/**, \
    app/Models/**, \
    app/Http/Resources/**, \
    app/Providers/AppServiceProvider.php, \
    resources/js/components/**/Columns.tsx, \
    resources/js/components/**/Filters.tsx, \
    resources/js/components/reports/**/Columns.tsx, \
    resources/js/components/reports/**/Filters.tsx, \
    resources/js/components/approval-audit-trail/Columns.tsx, \
    resources/js/components/approval-audit-trail/Filters.tsx, \
    resources/js/components/pipeline-audit-trail/Columns.tsx, \
    resources/js/components/pipeline-audit-trail/Filters.tsx, \
    resources/js/components/stock-monitor/Columns.tsx, \
    resources/js/components/stock-monitor/Filters.tsx, \
    resources/js/components/stock-movements/Columns.tsx, \
    resources/js/components/stock-movements/Filters.tsx
