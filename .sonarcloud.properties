# Shared configuration for SonarQube Cloud analysis.
sonar.sources=.
sonar.php.coverage.reportPaths=coverage.xml
sonar.exclusions=\
    .agent, \
    .claude, \
    .gitlab, \
    bootstrap/cache, \
    coverage-html, \
    coverage.xml, \
    database/migrations, \
    database/seeders, \
    docs, \
    lang, \
    nativephp, \
    public/build, \
    public/storage, \
    storage, \
    tests, \
    vendor
