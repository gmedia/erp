# Shared configuration for SonarQube Cloud analysis.
sonar.sources=app,resources/js
sonar.php.coverage.reportPaths=coverage.xml

# Exclude generated/vendor-like frontend wrappers from rule analysis noise.
sonar.exclusions=

# Exclude files that are not covered by PHPUnit-based coverage collection.
sonar.coverage.exclusions=\
    app/Domain/**, \
    app/Exports/**, \
    app/Http/Resources/**, \
    app/Models/**, \
    resources/js/**

# Keep rule/bug analysis on these files, but ignore copy-paste detection
# for backend report export/resource definitions that remain structurally repetitive.
sonar.cpd.exclusions=\
    app/Http/Resources/Reports/*Resource.php, \
    app/Http/Resources/Reports/BookValueDepreciationCollection.php, \
    app/Http/Resources/Reports/InventoryStocktakeVarianceReportCollection.php, \
    app/Http/Resources/Reports/InventoryValuationReportCollection.php, \
    app/Http/Resources/Reports/MaintenanceCostCollection.php, \
    app/Http/Resources/Reports/PurchaseHistoryReportCollection.php, \
    app/Http/Resources/Reports/StockAdjustmentReportCollection.php, \
    app/Http/Resources/Reports/StockMovementReportCollection.php
